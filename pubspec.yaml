name: smart_commerce
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_spinkit: ^5.2.2
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  get_it: ^9.2.1
  glassmorphism: ^3.0.0
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  shimmer: ^3.0.0
  speech_to_text: ^7.3.0
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
